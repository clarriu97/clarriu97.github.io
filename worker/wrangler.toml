name = "larri-chat"
main = "src/index.ts"
compatibility_date = "2026-07-01"

# Workers AI binding — this is what makes env.AI.run(...) work. No API key needed.
[ai]
binding = "AI"

# Origins allowed to call the Worker (CORS). Add your production domain here.
[vars]
ALLOWED_ORIGINS = "https://larri.dev,http://localhost:4321"

# Rate-limit counters (per-IP, phase 2 guardrail). Created with:
#   npx wrangler kv namespace create RATE_LIMIT
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "1570b0aa99f949239e69ad474ea99c34"

# To serve this at chat.larri.dev, add a route once the custom domain is set up
# in the Cloudflare dashboard (Workers & Pages -> your worker -> Settings ->
# Domains & Routes), or uncomment and adjust:
#
# [[routes]]
# pattern = "chat.larri.dev"
# custom_domain = true
